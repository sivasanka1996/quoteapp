name: Build Android APK

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android build tools
        run: sdkmanager "build-tools;34.0.0" "platforms;android-34"

      - name: Create Android project
        run: |
          mkdir -p app-project/app/src/main/res/values
          mkdir -p app-project/app/src/main/java/com/quoteapp/app
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > app-project/quoteapp-release.jks

      - name: Write build files
        run: |
          cat > app-project/settings.gradle << 'EOF'
          rootProject.name = "QuoteApp"
          include ':app'
          EOF

          cat > app-project/build.gradle << 'EOF'
          buildscript {
              repositories { google(); mavenCentral() }
              dependencies { classpath 'com.android.tools.build:gradle:8.2.2' }
          }
          allprojects { repositories { google(); mavenCentral() } }
          EOF

          cat > app-project/app/build.gradle << 'EOF'
          plugins { id 'com.android.application' }
          android {
              namespace 'com.quoteapp.app'
              compileSdk 34
              defaultConfig {
                  applicationId 'com.quoteapp.app'
                  minSdk 21
                  targetSdk 34
                  versionCode 5
                  versionName '1.4'
              }
              signingConfigs {
                  release {
                      storeFile file("../quoteapp-release.jks")
                      storePassword "quoteapp123"
                      keyAlias "quoteapp"
                      keyPassword "quoteapp123"
                  }
              }
              buildTypes {
                  debug {
                      signingConfig signingConfigs.release
                  }
                  release {
                      minifyEnabled false
                      signingConfig signingConfigs.release
                  }
              }
          }
          dependencies {
              implementation 'androidx.appcompat:appcompat:1.6.1'
          }
          EOF

          cat > app-project/app/src/main/AndroidManifest.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <manifest xmlns:android="http://schemas.android.com/apk/res/android">
              <uses-permission android:name="android.permission.INTERNET"/>
              <uses-permission android:name="android.permission.CAMERA"/>
              <uses-permission android:name="android.permission.READ_EXTERNAL_STORAGE"/>
              <uses-permission android:name="android.permission.READ_MEDIA_IMAGES"/>
              <application
                  android:label="Quotation App"
                  android:theme="@style/AppTheme"
                  android:allowBackup="true"
                  android:usesCleartextTraffic="false">
                  <activity
                      android:name=".MainActivity"
                      android:exported="true"
                      android:configChanges="orientation|screenSize|keyboardHidden">
                      <intent-filter>
                          <action android:name="android.intent.action.MAIN"/>
                          <category android:name="android.intent.category.LAUNCHER"/>
                      </intent-filter>
                  </activity>
                  <provider
                      android:name="androidx.core.content.FileProvider"
                      android:authorities="${applicationId}.fileprovider"
                      android:exported="false"
                      android:grantUriPermissions="true">
                      <meta-data
                          android:name="android.support.FILE_PROVIDER_PATHS"
                          android:resource="@xml/file_paths"/>
                  </provider>
              </application>
          </manifest>
          EOF

          mkdir -p app-project/app/src/main/res/xml
          cat > app-project/app/src/main/res/xml/file_paths.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <paths>
              <external-files-path name="pictures" path="Pictures/"/>
          </paths>
          EOF

          cat > app-project/app/src/main/java/com/quoteapp/app/MainActivity.java << 'EOF'
          package com.quoteapp.app;

          import android.Manifest;
          import android.app.Activity;
          import android.content.Intent;
          import android.content.pm.PackageManager;
          import android.net.Uri;
          import android.os.Bundle;
          import android.webkit.PermissionRequest;
          import android.webkit.ValueCallback;
          import android.webkit.WebChromeClient;
          import android.webkit.WebSettings;
          import android.webkit.WebView;
          import android.webkit.WebViewClient;
          import androidx.core.app.ActivityCompat;
          import androidx.core.content.ContextCompat;

          public class MainActivity extends Activity {
              private WebView webView;
              private ValueCallback<Uri[]> filePathCallback;
              private static final int FILE_CHOOSER_REQUEST = 1;
              private static final int CAMERA_PERMISSION_REQUEST = 2;

              @Override
              protected void onCreate(Bundle savedInstanceState) {
                  super.onCreate(savedInstanceState);

                  // Request camera permission upfront so getUserMedia works
                  if (ContextCompat.checkSelfPermission(this, Manifest.permission.CAMERA)
                          != PackageManager.PERMISSION_GRANTED) {
                      ActivityCompat.requestPermissions(this,
                          new String[]{Manifest.permission.CAMERA, Manifest.permission.READ_MEDIA_IMAGES},
                          CAMERA_PERMISSION_REQUEST);
                  }

                  webView = new WebView(this);
                  WebSettings s = webView.getSettings();
                  s.setJavaScriptEnabled(true);
                  s.setDomStorageEnabled(true);
                  s.setAllowFileAccess(true);
                  s.setMediaPlaybackRequiresUserGesture(false);

                  webView.setWebChromeClient(new WebChromeClient() {
                      @Override
                      public void onPermissionRequest(PermissionRequest request) {
                          // Grant WebView camera/mic permissions (OS permission already requested above)
                          runOnUiThread(() -> request.grant(request.getResources()));
                      }

                      @Override
                      public boolean onShowFileChooser(WebView wv, ValueCallback<Uri[]> cb,
                              FileChooserParams params) {
                          if (filePathCallback != null) filePathCallback.onReceiveValue(null);
                          filePathCallback = cb;
                          Intent intent = new Intent(Intent.ACTION_GET_CONTENT);
                          intent.setType("image/*");
                          try {
                              startActivityForResult(Intent.createChooser(intent, "Select Image"),
                                  FILE_CHOOSER_REQUEST);
                          } catch (Exception e) {
                              filePathCallback = null;
                              return false;
                          }
                          return true;
                      }
                  });

                  webView.setWebViewClient(new WebViewClient());
                  webView.loadUrl("https://quoteapp-3f48e.web.app");
                  setContentView(webView);
              }

              @Override
              protected void onActivityResult(int requestCode, int resultCode, Intent data) {
                  if (requestCode == FILE_CHOOSER_REQUEST && filePathCallback != null) {
                      Uri[] results = (resultCode == RESULT_OK && data != null && data.getData() != null)
                          ? new Uri[]{data.getData()} : null;
                      filePathCallback.onReceiveValue(results);
                      filePathCallback = null;
                  }
              }

              @Override
              public void onBackPressed() {
                  if (webView.canGoBack()) webView.goBack();
                  else super.onBackPressed();
              }
          }
          EOF

          cat > app-project/app/src/main/res/values/styles.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <resources>
              <style name="AppTheme" parent="Theme.AppCompat.Light.NoActionBar">
              </style>
          </resources>
          EOF

          cat > app-project/gradle.properties << 'EOF'
          android.useAndroidX=true
          android.enableJetifier=true
          EOF

      - name: Install Gradle
        run: |
          wget -q https://services.gradle.org/distributions/gradle-8.4-bin.zip -O gradle.zip
          unzip -q gradle.zip -d /opt/gradle
          echo "/opt/gradle/gradle-8.4/bin" >> $GITHUB_PATH

      - name: Build APK
        run: |
          cd app-project
          gradle assembleDebug --no-daemon
        env:
          ANDROID_HOME: /usr/local/lib/android/sdk

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: quoteapp-android
          path: app-project/app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error
