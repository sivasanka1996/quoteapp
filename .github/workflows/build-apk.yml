name: Build Android APK

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android build tools
        run: sdkmanager "build-tools;34.0.0" "platforms;android-34"

      - name: Create TWA Android project
        run: |
          mkdir -p twa-project/app/src/main/res/values
          mkdir -p twa-project/app/src/main/res/xml
          mkdir -p twa-project/app/src/main/java/com/quoteapp/app
          mkdir -p twa-project/gradle/wrapper

      - name: Write build files
        run: |
          # settings.gradle
          cat > twa-project/settings.gradle << 'EOF'
          rootProject.name = "QuoteApp"
          include ':app'
          EOF

          # root build.gradle
          cat > twa-project/build.gradle << 'EOF'
          buildscript {
              repositories { google(); mavenCentral() }
              dependencies { classpath 'com.android.tools.build:gradle:8.2.2' }
          }
          allprojects { repositories { google(); mavenCentral() } }
          EOF

          # app/build.gradle
          cat > twa-project/app/build.gradle << 'EOF'
          plugins { id 'com.android.application' }
          android {
              namespace 'com.quoteapp.app'
              compileSdk 34
              defaultConfig {
                  applicationId 'com.quoteapp.app'
                  minSdk 19
                  targetSdk 34
                  versionCode 1
                  versionName '1.0'
              }
              buildTypes {
                  release {
                      minifyEnabled false
                      signingConfig signingConfigs.debug
                  }
              }
          }
          dependencies {
              implementation 'com.google.androidbrowserhelper:androidbrowserhelper:2.5.0'
          }
          EOF

          # AndroidManifest.xml
          cat > twa-project/app/src/main/AndroidManifest.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <manifest xmlns:android="http://schemas.android.com/apk/res/android">
              <application
                  android:label="Quotation App"
                  android:theme="@style/AppTheme"
                  android:allowBackup="true">
                  <activity
                      android:name="com.google.androidbrowserhelper.trusted.LauncherActivity"
                      android:exported="true">
                      <meta-data
                          android:name="android.support.customtabs.trusted.DEFAULT_URL"
                          android:value="https://quoteapp-3f48e.web.app" />
                      <meta-data
                          android:name="android.support.customtabs.trusted.STATUS_BAR_COLOR"
                          android:resource="@color/colorPrimary" />
                      <meta-data
                          android:name="android.support.customtabs.trusted.SPLASH_IMAGE_DRAWABLE"
                          android:resource="@color/colorPrimary"/>
                      <intent-filter android:autoVerify="true">
                          <action android:name="android.intent.action.MAIN" />
                          <category android:name="android.intent.category.LAUNCHER" />
                      </intent-filter>
                      <intent-filter android:autoVerify="true">
                          <action android:name="android.intent.action.VIEW"/>
                          <category android:name="android.intent.category.DEFAULT" />
                          <category android:name="android.intent.category.BROWSABLE"/>
                          <data android:scheme="https" android:host="quoteapp-3f48e.web.app"/>
                      </intent-filter>
                  </activity>
              </application>
          </manifest>
          EOF

          # colors.xml
          cat > twa-project/app/src/main/res/values/colors.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <resources>
              <color name="colorPrimary">#1a1a1a</color>
          </resources>
          EOF

          # styles.xml
          cat > twa-project/app/src/main/res/values/styles.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <resources>
              <style name="AppTheme" parent="Theme.AppCompat.Light.NoActionBar">
                  <item name="colorPrimary">@color/colorPrimary</item>
              </style>
          </resources>
          EOF

          # gradle wrapper properties
          cat > twa-project/gradle/wrapper/gradle-wrapper.properties << 'EOF'
          distributionBase=GRADLE_USER_HOME
          distributionPath=wrapper/dists
          distributionUrl=https\://services.gradle.org/distributions/gradle-8.4-bin.zip
          zipStoreBase=GRADLE_USER_HOME
          zipStorePath=wrapper/dists
          EOF

          # download gradle wrapper
          cd twa-project
          wget -q https://raw.githubusercontent.com/gradle/gradle/master/gradlew -O gradlew
          chmod +x gradlew

      - name: Build APK
        run: |
          cd twa-project
          ./gradlew assembleRelease --no-daemon
        env:
          ANDROID_HOME: /usr/local/lib/android/sdk

      - name: Find and upload APK
        run: find twa-project -name "*.apk" | head -5

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: quoteapp-android
          path: twa-project/app/build/outputs/apk/**/*.apk
          if-no-files-found: error
