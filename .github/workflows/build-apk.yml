name: Build Android APK

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Bubblewrap and expect
        run: |
          npm install -g @bubblewrap/cli
          sudo apt-get install -y expect

      - name: Write TWA manifest
        run: |
          mkdir -p twa
          cat > twa/twa-manifest.json << 'EOF'
          {
            "packageId": "com.quoteapp.app",
            "host": "quoteapp-3f48e.web.app",
            "name": "Quotation App",
            "shortName": "Quotes",
            "startUrl": "/",
            "display": "standalone",
            "themeColor": "#1a1a1a",
            "backgroundColor": "#ffffff",
            "enableNotifications": false,
            "versions": {
              "appVersionCode": 1,
              "appVersionName": "1.0.0"
            },
            "signingKey": {
              "path": "android.keystore",
              "alias": "android"
            },
            "appVersionCode": 1,
            "appVersionName": "1.0.0",
            "shortcuts": [],
            "generatorApp": "bubblewrap-cli",
            "webManifestUrl": "https://quoteapp-3f48e.web.app/manifest.webmanifest",
            "isChromeOSOnly": false,
            "isMetaQuest": false,
            "fullScopeUrl": "https://quoteapp-3f48e.web.app/",
            "minSdkVersion": 19,
            "orientation": "portrait",
            "fingerprints": [],
            "icons": [
              { "src": "https://quoteapp-3f48e.web.app/pwa-512x512.png", "sizes": "512x512", "type": "image/png" }
            ]
          }
          EOF

      - name: Generate keystore
        run: |
          cd twa
          keytool -genkeypair -v \
            -keystore android.keystore \
            -alias android \
            -keyalg RSA \
            -keysize 2048 \
            -validity 10000 \
            -storepass android \
            -keypass android \
            -dname "CN=QuoteApp, OU=QuoteApp, O=QuoteApp, L=Hyderabad, S=Telangana, C=IN"

      - name: Build APK with expect
        run: |
          cd twa
          expect -c '
            set timeout 600
            spawn bubblewrap build --skipPwaValidation
            expect {
              "install the JDK" { send "Y\r"; exp_continue }
              "install the Android SDK" { send "Y\r"; exp_continue }
              "keystore" { send "\r"; exp_continue }
              eof
            }
          '

      - name: Find APK
        run: |
          echo "=== twa contents ==="
          ls -la twa/ || echo "twa dir missing"
          echo "=== searching for APKs ==="
          find / -name "*.apk" 2>/dev/null || echo "No APK found anywhere"

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: quoteapp-android
          path: "**/*.apk"
          if-no-files-found: warn
