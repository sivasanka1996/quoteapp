name: Build Android APK

on:
  workflow_dispatch: # run manually from GitHub Actions tab

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Bubblewrap
        run: npm install -g @bubblewrap/cli

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android build tools
        run: sdkmanager "build-tools;34.0.0" "platforms;android-34"

      - name: Write TWA manifest
        run: |
          mkdir -p twa
          cat > twa/twa-manifest.json << 'EOF'
          {
            "packageId": "com.quoteapp.app",
            "host": "quoteapp-3f48e.web.app",
            "name": "Quotation App",
            "shortName": "Quotes",
            "startUrl": "/",
            "display": "standalone",
            "themeColor": "#1a1a1a",
            "backgroundColor": "#ffffff",
            "enableNotifications": false,
            "versions": {
              "appVersionCode": 1,
              "appVersionName": "1.0.0"
            },
            "signingKey": {
              "path": "android.keystore",
              "alias": "android"
            },
            "appVersionCode": 1,
            "appVersionName": "1.0.0",
            "shortcuts": [],
            "generatorApp": "bubblewrap-cli",
            "webManifestUrl": "https://quoteapp-3f48e.web.app/manifest.webmanifest",
            "isChromeOSOnly": false,
            "isMetaQuest": false,
            "fullScopeUrl": "https://quoteapp-3f48e.web.app/",
            "minSdkVersion": 19,
            "orientation": "portrait",
            "fingerprints": [],
            "icons": [
              { "src": "https://quoteapp-3f48e.web.app/pwa-512x512.png", "sizes": "512x512", "type": "image/png" }
            ]
          }
          EOF

      - name: Generate keystore
        run: |
          cd twa
          keytool -genkeypair -v \
            -keystore android.keystore \
            -alias android \
            -keyalg RSA \
            -keysize 2048 \
            -validity 10000 \
            -storepass android \
            -keypass android \
            -dname "CN=QuoteApp, OU=QuoteApp, O=QuoteApp, L=Hyderabad, S=Telangana, C=IN"

      - name: Build APK
        run: |
          cd twa
          # Y = let Bubblewrap install JDK
          # n = don't install Android SDK (we already have it)
          # $ANDROID_SDK_ROOT = path to existing SDK
          printf "Y\nn\n${ANDROID_SDK_ROOT}\n\n\n\n\n\n" | bubblewrap build --skipPwaValidation
        env:
          ANDROID_SDK_ROOT: /usr/local/lib/android/sdk

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: quoteapp-android
          path: twa/app-release-signed.apk
          if-no-files-found: warn
